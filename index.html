    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <script>
        // ==================== Конфигурация ====================
        let tasks = [];
        let currentTaskIndex = 0;
        let currentTask = null;
        let pyodide = null;
        let isPyodideReady = false;
        let hasSurrendered = false;
        let taskStates = {};
        
        let generatedOutputsCache = {};

        // ==================== Функция для выполнения программных вставок ====================
        function evaluateExpression(expr) {
            if (typeof expr !== 'string') return expr;
            
            // Проверяем, содержит ли строка программную вставку
            const hasExpression = /['"]\s*\+\s*[^+]+\s*\+\s*['"]/.test(expr) || 
                                  /\.join\(/.test(expr) || 
                                  /range\(/.test(expr) ||
                                  /for\s+.*\s+in\s+range/.test(expr) ||
                                  /_\s+in\s+range/.test(expr);
            
            if (hasExpression) {
                try {
                    let jsExpr = expr;
                    
                    // Заменяем str() на String()
                    jsExpr = jsExpr.replace(/str\(([^)]+)\)/g, 'String($1)');
                    
                    // Заменяем range(stop)
                    jsExpr = jsExpr.replace(/range\((\d+)\)/g, (match, n) => {
                        return `Array.from({length: ${n}}, (_, i) => i)`;
                    });
                    
                    // Заменяем range(start, stop)
                    jsExpr = jsExpr.replace(/range\((\d+),\s*(\d+)\)/g, (match, start, end) => {
                        const len = parseInt(end) - parseInt(start);
                        return `Array.from({length: ${len}}, (_, i) => i + ${start})`;
                    });
                    
                    // Заменяем for _ in range(...) на Array.from
                    jsExpr = jsExpr.replace(/\[([^\]]+)\s+for\s+_\s+in\s+range\(([^)]+)\)\]/g, 
                        (match, expr, range) => {
                            return `Array.from({length: ${range}}, () => ${expr})`;
                        });
                    
                    // Заменяем for i in range(...)
                    jsExpr = jsExpr.replace(/\[([^\]]+)\s+for\s+(\w+)\s+in\s+range\(([^)]+)\)\]/g,
                        (match, expr, varName, range) => {
                            return `Array.from({length: ${range}}, (_, ${varName}) => ${expr})`;
                        });
                    
                    // Создаём функцию и выполняем её
                    const evalFn = new Function('return ' + jsExpr);
                    const result = evalFn();
                    
                    // Если результат - массив, преобразуем в строку с пробелами
                    if (Array.isArray(result)) {
                        return result.join(' ');
                    }
                    
                    return String(result);
                } catch (e) {
                    console.warn(`Ошибка выполнения выражения: ${expr.substring(0, 100)}...`, e);
                    return expr;
                }
            }
            return expr;
        }

        // ==================== Рекурсивная обработка всех строк в объекте ====================
        function processDynamicStrings(obj) {
            if (typeof obj === 'string') {
                return evaluateExpression(obj);
            } else if (Array.isArray(obj)) {
                return obj.map(item => processDynamicStrings(item));
            } else if (obj && typeof obj === 'object') {
                const newObj = {};
                for (const key in obj) {
                    newObj[key] = processDynamicStrings(obj[key]);
                }
                return newObj;
            }
            return obj;
        }

                // ==================== Автоматическое обнаружение задач ====================
        async function discoverTasks() {
            try {
                const response = await fetch('./index.json');
                if (!response.ok) {
                    console.error('Не удалось загрузить index.json');
                    return [];
                }
                const tasks = await response.json();
                for (const task of tasks) {
                    if (task.examples) {
                        task.examples = task.examples.map(ex => ({
                            ...ex,
                            input: processDynamicStrings(ex.input)
                        }));
                    }
                    if (task.tests) {
                        task.tests = task.tests.map(test => ({
                            ...test,
                            input: processDynamicStrings(test.input)
                        }));
                    }
                }
                console.log(` Всего найдено задач: ${tasks.length}`);
                return tasks;
            } catch (error) {
                console.error('Ошибка загрузки index.json:', error);
                return [];
            }
        }
// ==================== Загрузка задач ====================
        async function loadAllTasks() {
            const overlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            
            overlay.classList.add('active');
            loadingText.textContent = 'Поиск задач...';
            
            tasks = await discoverTasks();
            
            if (tasks.length === 0) {
                loadingText.textContent = '❌ Не найдено ни одной задачи!';
                setTimeout(() => overlay.classList.remove('active'), 3000);
                return;
            }
            
            tasks.forEach(task => {
                if (!taskStates[task.id]) {
                    taskStates[task.id] = {
                        code: '',
                        score: 0,
                        hasSurrendered: false,
                        solved: false
                    };
                }
            });
            
            loadingText.textContent = 'Загрузка Python окружения...';
            await initPyodide();
            overlay.classList.remove('active');
            
            loadTaskToUI(0);
            
            console.log(`Загружено задач: ${tasks.length}`);
        }

        // ==================== Pyodide ====================
        async function initPyodide() {
            try {
                pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/"
                });
                isPyodideReady = true;
                console.log('✅ Pyodide загружен успешно!');
            } catch (error) {
                console.error('❌ Ошибка загрузки Pyodide:', error);
            }
        }

        async function runPythonCode(code, inputData) {
            if (!isPyodideReady) throw new Error('Python окружение ещё не загружено');

            try {
                const escapedInput = inputData
                    .replace(/\\/g, '\\\\')
                    .replace(/'/g, "\\'")
                    .replace(/\n/g, '\\n');
                
                pyodide.runPython(`
import sys, io
sys.stdin = io.StringIO('${escapedInput}')
sys.stdout = io.StringIO()
                `);

                await pyodide.runPythonAsync(code);
                const output = pyodide.runPython('sys.stdout.getvalue()');
                
                pyodide.runPython('sys.stdin = sys.__stdin__\nsys.stdout = sys.__stdout__');
                
                return { success: true, output: output, error: null };
            } catch (error) {
                try { 
                    pyodide.runPython('sys.stdin = sys.__stdin__\nsys.stdout = sys.__stdout__'); 
                } catch (e) {}
                
                return { success: false, output: '', error: error.message };
            }
        }

        async function generateExpectedOutput(testInput, solution) {
            if (!isPyodideReady) throw new Error('Pyodide не готов');
            
            const result = await runPythonCode(solution, testInput);
            if (!result.success) {
                throw new Error(result.error);
            }
            return result.output.trim();
        }


        // ==================== UI: Отображение задачи ====================
        function loadTaskToUI(index) {
            if (index < 0 || index >= tasks.length) return;
            
            if (currentTask) {
                taskStates[currentTask.id].code = document.getElementById('codeEditor').value;
            }
            
            currentTaskIndex = index;
            currentTask = tasks[index];
            const state = taskStates[currentTask.id];
            hasSurrendered = state.hasSurrendered;
            
            document.getElementById('taskPanel').innerHTML = renderTaskPanel(currentTask, index);
            
            document.getElementById('codeEditor').value = state.code || '';
            updateLineNumbers();
            
            if (state.solved) {
                document.getElementById('scoreDisplay').style.display = 'inline-block';
                document.getElementById('scoreDisplay').textContent = state.score + '/' + currentTask.maxScore;
            } else {
                document.getElementById('scoreDisplay').style.display = 'none';
            }
            
            document.getElementById('hintBox').classList.remove('active');
            hideResults();
            
            updateNavigation();
        }

        function renderTaskPanel(task, index) {
            const difficultyClass = task.difficulty === 'easy' ? 'difficulty-easy' : 
                                   task.difficulty === 'medium' ? 'difficulty-medium' : 'difficulty-hard';
            const difficultyText = task.difficulty === 'easy' ? 'Лёгкая' : 
                                   task.difficulty === 'medium' ? 'Средняя' : 'Сложная';
            
            // Безопасное извлечение полей описания (поддержка обоих форматов)
            const desc = task.description || {};
            const intro = task.intro || desc.intro || 'Описание отсутствует';
            const rules = task.rules || desc.rules || [];
            const question = task.question || desc.question || '';
            
            return `
                <div class="task-header">
                    <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                        <div class="task-navigation">
                            <button class="nav-btn" onclick="previousTask()" ${index === 0 ? 'disabled' : ''}>◀</button>
                            <span class="task-counter">${index + 1} / ${tasks.length}</span>
                            <button class="nav-btn" onclick="nextTask()" ${index === tasks.length - 1 ? 'disabled' : ''}>▶</button>
                        </div>
                        <span class="difficulty-badge ${difficultyClass}">${difficultyText}</span>
                        <button class="btn btn-delete" onclick="confirmDeleteTask()" title="Удалить текущую задачу">🗑️</button>
                        <button class="btn btn-generate" onclick="openGenerateModal()" style="margin-left: auto;">➕ Создать задачу</button>
                    </div>
                    <div class="tasks-progress">
                        ${tasks.map((t, i) => `
                            <div class="task-dot ${i === index ? 'active' : ''} ${taskStates[t.id]?.solved ? 'solved' : ''}" 
                                 onclick="loadTaskToUI(${i})" 
                                 title="Задача ${i + 1}: ${t.title}">
                            </div>
                        `).join('')}
                    </div>
                </div>
                <h1>${task.title}</h1>
                <p>${intro}</p>
                <ul>
                    ${rules.map(rule => `<li>${rule}</li>`).join('')}
                </ul>
                <p>${question}</p>
                
                <h2>Формат ввода</h2>
                <p>${task.inputFormat}</p>
                
                <h2>Формат вывода</h2>
                <p>${task.outputFormat}</p>
                
                <div class="examples">
                    <h3>📋 Примеры</h3>
                    ${(task.examples || []).map((ex, i) => `
                        <div class="example-row">
                            <div class="example-box">
                                <div class="example-label">Ввод</div>
                                <div class="example-content">${(ex.input || '').replace(/\n/g, '<br>')}</div>
                            </div>
                            <div class="example-box">
                                <div class="example-label">Вывод</div>
                                <div class="example-content">${ex.output || '?'}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="limits">
                    <h4>⚙️ Ограничения</h4>
                    <ul>
                        <li>• Время: ${(task.constraints || {}).timeLimit || 'не указано'}</li>
                        <li>• Память: ${(task.constraints || {}).memoryLimit || 'не указано'}</li>
                        <li>• ${(task.constraints || {}).language || 'Python 3'}</li>
                    </ul>
                </div>
                
                <div class="limits" style="margin-top: 10px;">
                    <h4>🏆 Система оценивания</h4>
                    <ul>
                        ${(task.scoring || []).map(s => `<li>• ${s.condition} → не менее ${s.points} баллов</li>`).join('')}
                    </ul>
                </div>
            `;
        }

        function updateNavigation() {
            const dots = document.querySelectorAll('.task-dot');
            dots.forEach((dot, i) => {
                dot.className = 'task-dot';
                if (i === currentTaskIndex) dot.classList.add('active');
                if (tasks[i] && taskStates[tasks[i].id]?.solved) dot.classList.add('solved');
            });
        }

        function nextTask() {
            if (currentTaskIndex < tasks.length - 1) {
                loadTaskToUI(currentTaskIndex + 1);
            }
        }

        function previousTask() {
            if (currentTaskIndex > 0) {
                loadTaskToUI(currentTaskIndex - 1);
            }
        }

        function updateLineNumbers() {
            const editor = document.getElementById('codeEditor');
            const lineNumbers = document.getElementById('lineNumbers');
            const lines = editor.value.split('\n').length;
            let html = '';
            for (let i = 1; i <= Math.max(lines, 10); i++) {
                html += i + '<br>';
            }
            lineNumbers.innerHTML = html;
        }

        function syncScroll() {
            const editor = document.getElementById('codeEditor');
            const lineNumbers = document.getElementById('lineNumbers');
            lineNumbers.scrollTop = editor.scrollTop;
        }

        function resetCode() {
            document.getElementById('codeEditor').value = '';
            document.getElementById('hintBox').classList.remove('active');
            updateLineNumbers();
            hideResults();
        }

        function hideResults() {
            document.getElementById('resultsPanel').classList.remove('active');
        }

        function showResults(verdict, details) {
            const panel = document.getElementById('resultsPanel');
            panel.classList.add('active');
            
            const badge = document.getElementById('verdictBadge');
            const verdictText = document.getElementById('verdictText');
            
            if (verdict === 'OK') {
                badge.textContent = '✓ Верно';
                badge.className = 'verdict-badge verdict-ok';
                verdictText.textContent = details.skipped > 0 ? 'Все выполнимые тесты пройдены!' : 'Все тесты пройдены!';
            } else {
                badge.textContent = '✗ Ошибка';
                badge.className = 'verdict-badge verdict-wrong';
                verdictText.textContent = 'Некоторые тесты не пройдены';
            }
            
            document.getElementById('passedCount').textContent = details.passed;
            document.getElementById('failedCount').textContent = details.failed;
            document.getElementById('skippedCount').textContent = details.skipped || 0;
            
            const finalScore = hasSurrendered ? 0 : details.score;
            document.getElementById('scoreText').textContent = finalScore + '/' + currentTask.maxScore;
            
            const scoreDisplay = document.getElementById('scoreDisplay');
            scoreDisplay.style.display = 'inline-block';
            scoreDisplay.textContent = finalScore + '/' + currentTask.maxScore;
            
            document.getElementById('outputConsole').textContent = details.log;
            
            taskStates[currentTask.id].score = finalScore;
            taskStates[currentTask.id].solved = (verdict === 'OK' && !hasSurrendered);
            taskStates[currentTask.id].hasSurrendered = hasSurrendered;
            updateNavigation();
        }

        async function runTests(testSubset) {
            const code = document.getElementById('codeEditor').value;
            const runButton = document.getElementById('runButton');
            
            if (!code.trim()) {
                showResults('ERROR', {
                    passed: 0, failed: testSubset.length, skipped: 0, score: 0,
                    log: '❌ Пустой код решения'
                });
                return;
            }

            if (!isPyodideReady) {
                showResults('ERROR', {
                    passed: 0, failed: testSubset.length, skipped: 0, score: 0,
                    log: '❌ Python окружение ещё загружается. Подождите...'
                });
                return;
            }

            taskStates[currentTask.id].code = code;
            
            runButton.disabled = true;
            runButton.textContent = '⏳ Выполнение...';
            
            let passed = 0, failed = 0, skipped = 0, totalScore = 0;
            let logOutput = '';
            
            for (let i = 0; i < testSubset.length; i++) {
                const test = testSubset[i];
                
                try {
                    const cacheKey = test.group === 'Примеры' ? `example_${i}` : `test_${i}`;
                    const expectedOutput = generatedOutputsCache[currentTask.id]?.[cacheKey];
                    
                    if (expectedOutput === null || expectedOutput === undefined) {
                        logOutput += `⚠️ Тест "${test.group}": ПРОПУЩЕН - нет эталонного ответа\n\n`;
                        skipped++;
                        continue;
                    }
                    
                    const result = await runPythonCode(code, test.input);
                    
                    if (!result.success) {
                        logOutput += `❌ Тест "${test.group}": ОШИБКА ВЫПОЛНЕНИЯ\n${result.error}\n\n`;
                        failed++;
                        continue;
                    }
                    
                    const actualOutput = result.output.trim();
                    
                    if (actualOutput === expectedOutput) {
                        logOutput += `✅ Тест "${test.group}": пройден (+${test.points} баллов)\n`;
                        passed++;
                        totalScore += test.points;
                    } else {
                        logOutput += `❌ Тест "${test.group}": ожидалось "${expectedOutput}", получено "${actualOutput}"\n`;
                        failed++;
                    }
                } catch (error) {
                    logOutput += `⚠️ Тест "${test.group}": КРИТИЧЕСКАЯ ОШИБКА\n${error.message}\n\n`;
                    skipped++;
                }
            }
            
            const verdict = (failed === 0) ? 'OK' : 'WA';
            
            showResults(verdict, {
                passed, failed, skipped, score: totalScore,
                log: logOutput || 'Нет тестов для выполнения'
            });

            runButton.disabled = false;
            runButton.textContent = '▶️ Запустить';
        }

        function runSampleTests() {
            if (!currentTask) return;
            const sampleTests = currentTask.tests.filter(t => t.group === 'Примеры');
            runTests(sampleTests);
        }

        function runAllTests() {
            if (!currentTask) return;
            runTests(currentTask.tests);
        }

        function showHint() {
            if (!currentTask) return;
            
            document.getElementById('hintBox').innerHTML = `
                <h4>💡 Подсказка</h4>
                <p>${currentTask.hint.short}</p>
            `;
            document.getElementById('hintBox').classList.add('active');
            
            if (currentTask.hint.full) {
                const hint = currentTask.hint.full;
                document.getElementById('hintContent').innerHTML = `
                    <h2 style="color: #fbbf24;">💡 Подсказка</h2>
                    <h3>Ключевая идея:</h3>
                    <div class="idea-text"><p>${hint.keyIdea}</p></div>
                    <h3>План решения:</h3>
                    <div class="idea-text">
                        <ol>${hint.steps.map(step => `<li>${step}</li>`).join('')}</ol>
                    </div>
                    <p style="color: #fbbf24;">⚠️ ${hint.warning}</p>
                    <div class="modal-buttons">
                        <button class="btn btn-secondary" onclick="closeHintModal()">Понятно, попробую!</button>
                    </div>
                `;
                document.getElementById('hintModal').classList.add('active');
            }
        }

        function closeHintModal() {
            document.getElementById('hintModal').classList.remove('active');
        }

        function openSurrenderModal() {
            if (!currentTask) return;
            
            document.getElementById('surrenderContent').innerHTML = `
                <h2>⚠️ Вы уверены?</h2>
                <p>Вы собираетесь посмотреть полное решение. Это действие <strong>обнулит ваши баллы</strong> за эту задачу.</p>
                <div id="fullSolution" style="display: none;">
                    <h3>💡 Идея решения:</h3>
                    <div class="idea-text">
                        <p><strong>${currentTask.solutionExplanation.idea}</strong></p>
                        <p>${currentTask.solutionExplanation.why}</p>
                        <p><strong>Сложность:</strong> ${currentTask.solutionExplanation.complexity}</p>
                    </div>
                    <h3>📝 Решение:</h3>
                    <div class="solution-code">${currentTask.solution}</div>
                </div>
                <div class="modal-buttons">
                    <button class="btn btn-secondary" onclick="closeSurrenderModal()">Отмена</button>
                    <button class="btn btn-danger" id="showSolutionBtn" onclick="showSolution()">Показать решение</button>
                </div>
            `;
            document.getElementById('surrenderModal').classList.add('active');
        }

        function closeSurrenderModal() {
            document.getElementById('surrenderModal').classList.remove('active');
        }

        function showSolution() {
            hasSurrendered = true;
            if (currentTask) taskStates[currentTask.id].hasSurrendered = true;
            
            document.getElementById('fullSolution').style.display = 'block';
            document.getElementById('showSolutionBtn').style.display = 'none';
            
            document.getElementById('outputConsole').textContent = '⚠️ Вы посмотрели правильное решение. Баллы обнулены.';
            document.getElementById('resultsPanel').classList.add('active');
            document.getElementById('verdictBadge').textContent = '🏳️ Сдался';
            document.getElementById('verdictBadge').className = 'verdict-badge verdict-wrong';
            document.getElementById('verdictText').textContent = 'Решение показано';
            document.getElementById('scoreDisplay').style.display = 'inline-block';
            document.getElementById('scoreDisplay').textContent = '0/' + (currentTask ? currentTask.maxScore : 100);
            document.getElementById('scoreText').textContent = '0/' + (currentTask ? currentTask.maxScore : 100);
        }

        // ==================== Генерация задач ====================
                function openGenerateModal() {
                    document.getElementById('generateModal').classList.add('active');
                }

                function closeGenerateModal() {
                    document.getElementById('generateModal').classList.remove('active');
                }

                async function generateNewTask() {
                    const topic = document.getElementById('topicSelect').value;
                    const difficulty = parseInt(document.getElementById('difficultySlider').value);
            
                    const button = document.getElementById('generateTaskButton');
                    const originalText = button.textContent;
            
                    // Блокируем кнопку и показываем индикатор загрузки
                    button.disabled = true;
                    button.textContent = '⏳ Генерация...';
            
                    try {
                        // Отправляем запрос на сервер
                        const response = await fetch('/api/generate', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                topic: topic,
                                difficulty: difficulty
                            })
                        });
                
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                
                        const data = await response.json();
                        const newTask = data.task;
                        
                        if (!newTask) {
                            throw new Error(data.error || 'Сервер не вернул задачу');
                        }
                
                        // Добавляем новую задачу в массив
                        tasks.push(newTask);
                
                        // Инициализируем состояние для новой задачи
                        taskStates[newTask.id] = {
                            code: '',
                            score: 0,
                            hasSurrendered: false,
                            solved: false
                        };
                
                        // Закрываем модальное окно
                        closeGenerateModal();
                
                        // Переключаемся на новую задачу (последнюю в списке)
                        loadTaskToUI(tasks.length - 1);
                        updateNavigation();
                
                        alert('✅ Задача "' + newTask.title + '" успешно создана!');
                
                    } catch (error) {
                        console.error('Ошибка при генерации задачи:', error);
                        alert('❌ Произошла ошибка при генерации задачи. Проверьте консоль разработчика (F12).\\n\\nДетали: ' + error.message);
                    } finally {
                        // Восстанавливаем кнопку
                        button.disabled = false;
                        button.textContent = originalText;
                    }
                }

                // Глобальная переменная для отслеживания текущей задачи
                let currentTaskIndex = 0;

                // Функция удаления задачи
                async function confirmDeleteTask() {
                    if (!tasks || tasks.length === 0) {
                        alert('❌ Нет задач для удаления');
                        return;
                    }

                    const currentTask = tasks[currentTaskIndex];
                    const confirmMessage = '⚠️ Вы уверены, что хотите удалить задачу "' + currentTask.title + '"?\n\nЭто действие нельзя отменить.';

                    if (!confirm(confirmMessage)) {
                        return;
                    }

                    try {
                        const response = await fetch('/api/tasks/' + encodeURIComponent(currentTask.id), {
                            method: 'DELETE',
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        });

                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(errorData.error || 'HTTP error! status: ' + response.status);
                        }

                        tasks.splice(currentTaskIndex, 1);
                        
                        if (currentTask.id) {
                            delete taskStates[currentTask.id];
                        }

                        if (tasks.length > 0) {
                            const newIndex = Math.min(currentTaskIndex, tasks.length - 1);
                            loadTaskToUI(newIndex);
                        } else {
                            document.getElementById('taskPanel').innerHTML = '<p>Нет доступных задач. Создайте новую задачу.</p>';
                        }
                        
                        updateNavigation();
                        alert('✅ Задача успешно удалена!');
                    } catch (error) {
                        console.error('Ошибка при удалении задачи:', error);
                        alert('❌ Произошла ошибка при удалении задачи. Проверьте консоль разработчика.');
                    }
                }

                document.addEventListener('DOMContentLoaded', () => {
                    const editor = document.getElementById('codeEditor');
            
                    // Обработчик для ползунка сложности
                    const difficultySlider = document.getElementById('difficultySlider');
                    const difficultyValue = document.getElementById('difficultyValue');
                    if (difficultySlider && difficultyValue) {
                        difficultySlider.addEventListener('input', function() {
                            difficultyValue.textContent = this.value + '%';
                        });
                    }
            
                    updateLineNumbers();
                    editor.addEventListener('scroll', syncScroll);
                    editor.addEventListener('input', updateLineNumbers);
            
                    editor.addEventListener('keydown', (e) => {
                        if (e.key === 'Tab') {
                            e.preventDefault();
                            const start = editor.selectionStart;
                            const end = editor.selectionEnd;
                            editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                            editor.selectionStart = editor.selectionEnd = start + 4;
                            updateLineNumbers();
                        }
                    });

                    loadAllTasks();
                });
    </script>
